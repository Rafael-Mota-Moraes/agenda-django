{% extends 'base.html' %}

{% block 'conteudo' %}
  
  {% include 'parciais/_message.html' %}
  <h1>Olá {{ user }}</h1>

  <div class='container mb-5'>
    <form method="POST" action="{% url 'dashboard' %}" enctype="multipart/form-data">
      {% csrf_token %}
      <table class="table">
        {{form}}

        <tr>
          <td colspan='2'></td>
        </tr>

      </table>
      <button type="submit" class="btn btn-primary py-2 px-5">Enviar</button>
    </form>
  </div>

{% endblock 'conteudo' %}
